<!DOCTYPE html>
<html lang="zh" style="color-scheme: dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Quiz Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #1a1a2e; font-family: 'Inter', system-ui, sans-serif; }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      transition: background-color 0.2s, transform 0.2s;
    }
    .card:hover { background: rgba(255,255,255,0.1); }
    .card:focus-visible { outline: 3px solid #60a5fa; outline-offset: 2px; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="text-center">
    <h1 class="text-5xl font-bold text-white mb-2" style="text-wrap: balance">Quiz Night</h1>
    <p class="text-gray-400 mb-12">选择你的角色 / Choose Your Role</p>
    <nav class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl" aria-label="Role selection">
      <a href="/player.html" class="card rounded-2xl p-8 text-center hover:scale-105">
        <div class="text-5xl mb-4" aria-hidden="true">📱</div>
        <h2 class="text-xl font-bold text-white mb-2">Player 玩家</h2>
        <p class="text-gray-400 text-sm">加入游戏，参与抢答</p>
      </a>
      <a href="/display.html" class="card rounded-2xl p-8 text-center hover:scale-105">
        <div class="text-5xl mb-4" aria-hidden="true">🖥️</div>
        <h2 class="text-xl font-bold text-white mb-2">Display 大屏</h2>
        <p class="text-gray-400 text-sm">投影显示题板和计分</p>
      </a>
      <a href="/host.html" class="card rounded-2xl p-8 text-center hover:scale-105">
        <div class="text-5xl mb-4" aria-hidden="true">🎮</div>
        <h2 class="text-xl font-bold text-white mb-2">Host 主持人</h2>
        <p class="text-gray-400 text-sm">控制游戏进度</p>
      </a>
    </nav>
  </div>
</body>
</html>
